<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Preço e Margem - Hamburgueria</title>
    <!-- Tailwind CSS para um design profissional instantâneo -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 p-6 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-2xl font-bold text-amber-500 mb-2 flex items-center gap-2">
            🍔 Preço Certo - Delivery
        </h1>
        <p class="text-gray-400 text-sm mb-6">Calcule o preço de venda ideal do seu hambúrguer com base nos custos reais.</p>

        <!-- Formuário de Entrada -->
        <div class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Custo dos Ingredientes (CMV)</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-500">R$</span>
                    <input type="number" id="custoIngredientes" value="8.50" step="0.01" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-2 pl-9 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Custo da Embalagem</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-500">R$</span>
                    <input type="number" id="custoEmbalagem" value="1.80" step="0.01" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-2 pl-9 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Taxa do Aplicativo (ex: iFood %)</label>
                <div class="relative">
                    <input type="number" id="taxaApp" value="12" step="0.1" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-2 pr-8 text-white focus:outline-none focus:border-amber-500">
                    <span class="absolute right-3 top-2.5 text-gray-500">%</span>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Preço Desejado de Venda</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-500">R$</span>
                    <input type="number" id="precoVenda" value="28.00" step="0.01" class="w-full bg-gray-950 border border-gray-700 rounded-lg p-2 pl-9 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <button onclick="calcularMargem()" class="w-full bg-amber-500 hover:bg-amber-600 text-gray-950 font-bold p-3 rounded-lg transition-colors mt-2">
                Calcular Lucro Real
            </button>
        </div>

        <!-- Painel de Resultados -->
        <div class="mt-6 pt-6 border-t border-gray-700 space-y-3">
            <div class="flex justify-between items-center bg-gray-950 p-3 rounded-lg">
                <span class="text-sm text-gray-400">Lucro Bruto em Dinheiro:</span>
                <span id="lucroDinheiro" class="font-bold text-lg text-emerald-400">R$ 0,00</span>
            </div>

            <div class="flex justify-between items-center bg-gray-950 p-3 rounded-lg">
                <span class="text-sm text-gray-400">Margem de Lucro Real:</span>
                <span id="margemPorcentagem" class="font-bold text-lg text-emerald-400">0%</span>
            </div>
            
            <!-- Alerta sobre a saúde do lucro -->
            <div id="alertaPreco" class="text-xs p-3 rounded-lg text-center font-medium hidden"></div>
        </div>
    </div>

    <!-- Lógica JavaScript de Negócio -->
    <script>
        function calcularMargem() {
            // Captura os valores digitados pelo usuário
            const custoIngredientes = parseFloat(document.getElementById('custoIngredientes').value) || 0;
            const custoEmbalagem = parseFloat(document.getElementById('custoEmbalagem').value) || 0;
            const taxaAppPercentual = parseFloat(document.getElementById('taxaApp').value) || 0;
            const precoVenda = parseFloat(document.getElementById('precoVenda').value) || 0;

            if (precoVenda <= 0) {
                alert("Por favor, insira um preço de venda maior que zero.");
                return;
            }

            // Cálculos específicos do nicho de delivery
            const custoTotalDireto = custoIngredientes + custoEmbalagem;
            const valorTaxaApp = precoVenda * (taxaAppPercentual / 100);
            
            // Lucro descontando os insumos e a comissão da plataforma de entrega
            const lucroBruto = precoVenda - custoTotalDireto - valorTaxaApp;
            const margemLucro = (lucroBruto / precoVenda) * 100;

            // Atualiza os elementos na tela com formatação brasileira
            document.getElementById('lucroDinheiro').innerText = lucroBruto.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('margemPorcentagem').innerText = margemLucro.toFixed(1) + '%';

            // Elemento de feedback visual (Alerta de saúde financeira)
            const alerta = document.getElementById('alertaPreco');
            alerta.classList.remove('hidden', 'bg-red-950', 'text-red-400', 'bg-emerald-950', 'text-emerald-400', 'bg-amber-950', 'text-amber-400');

            if (margemLucro < 20) {
                alerta.innerText = "⚠️ Margem Perigosa! Abaixo de 20%. Você pode estar pagando para trabalhar.";
                alerta.classList.add('bg-red-950', 'text-red-400');
            } else if (margemLucro >= 20 && margemLucro < 40) {
                alerta.innerText = "👍 Margem Saudável para Delivery (entre 20% e 40%).";
                alerta.classList.add('bg-amber-950', 'text-amber-400');
            } else {
                alerta.innerText = "🔥 Excelente Margem! Acima de 40%. Produto altamente lucrativo.";
                alerta.classList.add('bg-emerald-950', 'text-emerald-400');
            }
        }

        // Executa o cálculo automático ao carregar a página pela primeira vez
        window.onload = calcularMargem;
    </script>
</body>
</html>
